- id: P-16
  title: Misaligned Topic Sentence Scoring
  problem_statement: Heuristic flow scoring models assume the first sentence of a paragraph is always the topic sentence,
    yielding false negatives when authors place the thesis mid-paragraph or at the end.
  causal_mechanism: Natural variance in human rhetorical patterns not accounted for by position-based heuristics.
