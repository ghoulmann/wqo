- id: P-15
  title: Linters Limited to Syntax Verification
  problem_statement: Markdown linters check spelling and formatting syntax but cannot evaluate flow, unity, or semantic coherence,
    producing technically valid documents that are cognitively dense and prone to RAG mis-indexing.
  causal_mechanism: Traditional linters rely on static regex rules that lack semantic or rhetorical comprehension of natural
    language.
