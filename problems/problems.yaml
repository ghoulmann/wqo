problems:
- id: P-01
  title: Documentation Drift (Code Ahead of Docs)
  problem_statement: Codebases evolve rapidly through automated CI/CD cycles while technical reference documents remain static,
    creating systematic divergence between active software behavior and published guidance.
  causal_mechanism: Process Myopia — software development is decoupled from knowledge externalization; documentation is treated
    as a post-release deliverable rather than a design-time dependency.
  domain_category: documentation-drift
  system_boundary: versioning
  impact:
  - rag-retrieval
  - reader-comprehension
  - reader-trust
  risk_severity: credibility
  resolution_pattern: ci-gate
