title: Accessibility Compliance
description: 'Conformance to WCAG 2.1/2.2 success criteria at the publishing stage:
  all non-decorative images have alt text, text contrast meets AA minimums, interactive
  components are keyboard-navigable, and content is navigable by screen reader.'
