title: Translation Pipeline Quality
description: 'The correctness of the localization production process: source strings
  extracted without corruption, machine translation reviewed before publish, all locales
  receive translated content (no silent English fallback), and locale-specific formatting
  (date, currency, number) is applied correctly.'
